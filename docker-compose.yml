services:
  postgres:
    image: postgres:16-alpine
    container_name: deusa-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deusa
      POSTGRES_PASSWORD: deusa
      POSTGRES_DB: deusa_analytics
    ports:
      - "5435:5432"
    volumes:
      - deusa_analytics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deusa -d deusa_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  deusa_analytics_pgdata:
